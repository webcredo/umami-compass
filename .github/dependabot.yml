version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      # Keep type checking aligned with the oldest supported Node.js runtime.
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
