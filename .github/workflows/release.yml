name: Publish release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

env:
  MCP_PUBLISHER_VERSION: 1.7.9
  MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref }}
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.9.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Resolve and verify release metadata
        run: |
          node <<'NODE'
          const { appendFileSync, readFileSync } = require("node:fs");
          const packageJson = JSON.parse(readFileSync("package.json", "utf8"));
          const serverJson = JSON.parse(readFileSync("server.json", "utf8"));
          const expectedTag = `v${packageJson.version}`;
          const registryPackage = serverJson.packages?.[0];
          if (process.env.GITHUB_REF_TYPE !== "tag" || process.env.GITHUB_REF_NAME !== expectedTag) {
            throw new Error(`release must run from exact tag ${expectedTag}`);
          }
          if (
            serverJson.version !== packageJson.version ||
            registryPackage?.version !== packageJson.version ||
            registryPackage?.identifier !== packageJson.name ||
            serverJson.name !== packageJson.mcpName
          ) {
            throw new Error("package.json and server.json release metadata are out of sync");
          }
          const npmTag = packageJson.version.includes("-") ? "next" : "latest";
          const registryVersionUrl =
            `https://registry.modelcontextprotocol.io/v0.1/servers/${encodeURIComponent(serverJson.name)}` +
            `/versions/${encodeURIComponent(packageJson.version)}`;
          appendFileSync(
            process.env.GITHUB_ENV,
            `PACKAGE_NAME=${packageJson.name}\n` +
              `PACKAGE_VERSION=${packageJson.version}\n` +
              `NPM_TAG=${npmTag}\n` +
              `REGISTRY_VERSION_URL=${registryVersionUrl}\n`,
          );
          NODE
      - name: Install and verify
        run: |
          npm install --global npm@12.0.1
          pnpm install --frozen-lockfile
          pnpm check
          pnpm smoke:package
      - name: Install and validate MCP Registry publisher
        run: |
          publisher_archive="${RUNNER_TEMP}/mcp-publisher.tar.gz"
          curl --fail --location --retry 3 --output "${publisher_archive}" \
            "https://github.com/modelcontextprotocol/registry/releases/download/v${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          echo "${MCP_PUBLISHER_SHA256}  ${publisher_archive}" | sha256sum --check
          tar -xzf "${publisher_archive}" -C "${RUNNER_TEMP}" mcp-publisher
          echo "MCP_PUBLISHER_PATH=${RUNNER_TEMP}/mcp-publisher" >> "${GITHUB_ENV}"
          "${RUNNER_TEMP}/mcp-publisher" validate
      - name: Publish npm package with provenance
        shell: bash
        run: |
          existing_commit="$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" gitHead 2>/dev/null || true)"
          release_commit="$(git rev-parse HEAD)"
          if [[ -n "${existing_commit}" ]]; then
            if [[ "${existing_commit}" != "${release_commit}" ]]; then
              echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists from ${existing_commit}, expected ${release_commit}" >&2
              exit 1
            fi
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published from this commit"
          else
            npm publish --provenance --access public --tag "${NPM_TAG}"
          fi
      - name: Verify npm release channel
        shell: bash
        run: |
          release_commit="$(git rev-parse HEAD)"
          for attempt in {1..12}; do
            published_version="$(npm view "${PACKAGE_NAME}@${NPM_TAG}" version 2>/dev/null || true)"
            published_commit="$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" gitHead 2>/dev/null || true)"
            if [[ "${published_version}" == "${PACKAGE_VERSION}" && "${published_commit}" == "${release_commit}" ]]; then
              exit 0
            fi
            echo "Waiting for npm propagation (${attempt}/12)"
            sleep 5
          done
          echo "npm ${NPM_TAG} did not resolve to ${PACKAGE_NAME}@${PACKAGE_VERSION} from ${release_commit}" >&2
          exit 1
      - name: Publish MCP Registry metadata
        shell: bash
        run: |
          if registry_json="$(curl --fail --location --retry 3 --retry-all-errors "${REGISTRY_VERSION_URL}")"; then
            if ! jq -e --arg version "${PACKAGE_VERSION}" \
              '.server.version == $version and .server.packages[0].version == $version' \
              <<<"${registry_json}" >/dev/null; then
              echo "MCP Registry returned inconsistent metadata for ${PACKAGE_VERSION}" >&2
              exit 1
            fi
            echo "MCP Registry already contains the exact ${PACKAGE_VERSION} record"
          else
            "${MCP_PUBLISHER_PATH}" login github-oidc
            "${MCP_PUBLISHER_PATH}" publish
          fi
      - name: Verify MCP Registry publication
        shell: bash
        run: |
          for attempt in {1..12}; do
            if curl --fail --location --retry 3 --retry-all-errors "${REGISTRY_VERSION_URL}" | jq -e --arg version "${PACKAGE_VERSION}" \
              '.server.version == $version and .server.packages[0].version == $version' \
              >/dev/null; then
              exit 0
            fi
            echo "Waiting for MCP Registry propagation (${attempt}/12)"
            sleep 5
          done
          echo "MCP Registry did not expose ${PACKAGE_VERSION}" >&2
          exit 1
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "GitHub release ${GITHUB_REF_NAME} already exists"
            exit 0
          fi
          release_flags=()
          if [[ "${PACKAGE_VERSION}" == *-* ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            "${release_flags[@]}"
