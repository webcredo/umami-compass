name: Publish npm package

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.ref }}
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.9.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Require an exact version tag
        run: |
          node -e "const p=require('./package.json'); if (process.env.GITHUB_REF !== 'refs/tags/v'+p.version) process.exit(1)"
      - name: Install and verify
        run: |
          npm install --global npm@12.0.1
          pnpm install --frozen-lockfile
          pnpm check
          pnpm smoke:package
      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          # Bootstrap only: remove NPM_TOKEN after configuring npm Trusted Publishing.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
